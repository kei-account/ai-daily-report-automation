name: Daily AI Report

on:
  # Scheduling is handled by cron-job.org via workflow_dispatch.
  # Keep GitHub's built-in schedule disabled to avoid duplicate daily emails.
  workflow_dispatch:

jobs:
  send-daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate and send report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
          REPORT_RECIPIENT_NAME: ${{ secrets.REPORT_RECIPIENT_NAME }}
        run: npm run daily

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-daily-report-artifacts
          path: |
            outputs/*.docx
            email_body.txt
            research_data.json
          if-no-files-found: ignore
