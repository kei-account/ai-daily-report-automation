name: Hourly Delivery Test

on:
  workflow_dispatch:

jobs:
  send-test-report:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate and send test reports every 10 minutes
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
          REPORT_RECIPIENT_NAME: ${{ secrets.REPORT_RECIPIENT_NAME }}
        run: |
          for i in 1 2 3; do
            echo "Starting test send $i of 3"
            npm run daily
            if [ "$i" != "3" ]; then
              echo "Waiting 10 minutes before next test send..."
              sleep 600
            fi
          done

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hourly-delivery-test-artifacts
          path: |
            outputs/*.docx
            email_body.txt
            research_data.json
          if-no-files-found: ignore
