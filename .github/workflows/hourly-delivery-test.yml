name: Hourly Delivery Test

on:
  schedule:
    # Temporary test schedule for 2026-06-05 JST:
    # 13:00, 14:00, 15:00 JST = 04:00, 05:00, 06:00 UTC.
    - cron: "0 4 5 6 *"
    - cron: "0 5 5 6 *"
    - cron: "0 6 5 6 *"
  workflow_dispatch:

jobs:
  send-test-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate and send test report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
          REPORT_RECIPIENT_NAME: ${{ secrets.REPORT_RECIPIENT_NAME }}
        run: npm run daily

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hourly-delivery-test-artifacts
          path: |
            outputs/*.docx
            email_body.txt
            research_data.json
          if-no-files-found: ignore
