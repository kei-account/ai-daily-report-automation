name: Hourly Delivery Test

on:
  schedule:
    # Temporary 10-minute delivery test.
    # Active send window: 2026-06-05 12:00-12:29 UTC
    # = 2026-06-05 21:00-21:29 JST.
    # Expected send attempts: 12:00, 12:10, 12:20 UTC.
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  send-test-report:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate and send test report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
          REPORT_RECIPIENT_NAME: ${{ secrets.REPORT_RECIPIENT_NAME }}
        run: |
          now="$(date -u +'%Y-%m-%d %H:%M')"
          minute="$(date -u +'%M')"
          echo "Current UTC time: $now"

          if [ "$(date -u +'%Y-%m-%d %H')" != "2026-06-05 12" ]; then
            echo "Outside temporary test hour; skipping send."
            exit 0
          fi

          if [ "$minute" -ge 30 ]; then
            echo "Temporary test window has ended; skipping send."
            exit 0
          fi

          npm run daily

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hourly-delivery-test-artifacts
          path: |
            outputs/*.docx
            email_body.txt
            research_data.json
          if-no-files-found: ignore
