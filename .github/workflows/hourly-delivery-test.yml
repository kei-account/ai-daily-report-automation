name: Scheduled One-Time Send Test

on:
  schedule:
    # Temporary one-time schedule test. GitHub may delay schedule events.
    # This workflow disables itself after a successful send to avoid duplicates.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: scheduled-one-time-send-test
  cancel-in-progress: false

jobs:
  send-test-report:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate and send test report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
          REPORT_RECIPIENT_NAME: ${{ secrets.REPORT_RECIPIENT_NAME }}
        run: |
          echo "Triggered by: $GITHUB_EVENT_NAME"
          echo "Current UTC time: $(date -u +'%Y-%m-%d %H:%M:%S')"
          npm run daily

      - name: Disable this temporary test workflow after successful send
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow disable "Scheduled One-Time Send Test"

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hourly-delivery-test-artifacts
          path: |
            outputs/*.docx
            email_body.txt
            email_body.html
            research_data.json
          if-no-files-found: ignore
